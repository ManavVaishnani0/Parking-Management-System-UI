<!DOCTYPE html>
<html>
<head>
    <title>Parking System</title>
    <style>
        body {
            text-align: center;
            background: black;
            color: white;
            font-family: Arial;
        }
        input, button {
            padding: 10px;
            margin: 10px;
        }
    </style>
</head>
<body>

<h1>🚗 Parking Management System</h1>

<input id="vehicle" placeholder="Enter Vehicle Number">

<br>

<button onclick="enterParking()">Enter Parking</button>
<button onclick="exitParking()">Exit Parking</button>

<p id="output"></p>

<script>
function enterParking() {
    let num = document.getElementById("vehicle").value;

    fetch(`/enter?number=${num}`)
        .then(res => {
            if (!res.ok) throw new Error("HTTP error");
            return res.text();
        })
        .then(data => {
            document.getElementById("output").innerText = data;
        })
        .catch(err => {
            console.error(err);
            document.getElementById("output").innerText = "Server Error!";
        });
}

function exitParking() {
    fetch(`/exit`)
        .then(res => {
            if (!res.ok) throw new Error("HTTP error");
            return res.text();
        })
        .then(data => {
            document.getElementById("output").innerText = data;
        })
        .catch(err => {
            console.error(err);
            document.getElementById("output").innerText = "Server Error!";
        });
}
</script>

</body>
</html>
